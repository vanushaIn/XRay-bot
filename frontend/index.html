<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VPN Speed Test</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Speed Test</h1>
            <span class="close" onclick="Telegram.WebApp.close()">✕</span>
        </div>

        <div class="status" id="connection-status">
            <div class="status-icon" id="status-icon">🔴</div>
            <div class="status-text" id="status-text">Not Connected</div>
        </div>

        <div class="server-info">
            <div class="server-location">
                <span class="flag">🇬🇧</span>
                <span class="country" id="country">United Kingdom</span>
            </div>
            <div class="server-ip" id="server-ip">212.36.956.87</div>
        </div>

        <div class="speed-display">
            <div class="speed-item">
                <div class="speed-label">Download</div>
                <div class="speed-value" id="download-speed">0.00</div>
                <div class="speed-unit">Mbps</div>
            </div>
            <div class="speed-item">
                <div class="speed-label">Upload</div>
                <div class="speed-value" id="upload-speed">0.00</div>
                <div class="speed-unit">Mbps</div>
            </div>
        </div>

        <div class="ping-info">
            <div class="ping-item">
                <span>Ping</span>
                <span id="ping">0</span> ms
            </div>
            <div class="ping-item">
                <span>Jitter</span>
                <span id="jitter">0</span> ms
            </div>
        </div>

        <button class="test-btn" id="test-btn">GO</button>

        <div class="footer">
            <div class="tab-bar">
                <div class="tab active" data-tab="home">🏠</div>
                <div class="tab" data-tab="profile">👤</div>
                <div class="tab" data-tab="service">🛠️</div>
                <div class="tab" data-tab="settings">⚙️</div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
